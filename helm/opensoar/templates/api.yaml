apiVersion: v1
kind: Service
metadata:
  name: api
  labels:
{{ include "opensoar.labels" . | indent 4 }}
spec:
  type: {{ .Values.api.service.type }}
  ports:
    - name: http
      port: {{ .Values.api.service.port }}
      targetPort: 8000
  selector:
    app.kubernetes.io/component: api
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: api
  labels:
{{ include "opensoar.labels" . | indent 4 }}
    app.kubernetes.io/component: api
spec:
  replicas: {{ .Values.api.replicaCount }}
  selector:
    matchLabels:
      app.kubernetes.io/component: api
  template:
    metadata:
      labels:
{{ include "opensoar.labels" . | indent 8 }}
        app.kubernetes.io/component: api
    spec:
      containers:
        - name: api
          image: "{{ .Values.images.api.repository }}:{{ .Values.images.api.tag }}"
          imagePullPolicy: {{ .Values.images.api.pullPolicy }}
          env:
            - name: DATABASE_URL
              valueFrom:
                secretKeyRef:
                  name: opensoar-secrets
                  key: database-url
            - name: REDIS_URL
              valueFrom:
                secretKeyRef:
                  name: opensoar-secrets
                  key: redis-url
            - name: CELERY_BROKER_URL
              valueFrom:
                secretKeyRef:
                  name: opensoar-secrets
                  key: celery-broker-url
            - name: JWT_SECRET
              valueFrom:
                secretKeyRef:
                  name: opensoar-secrets
                  key: jwt-secret
            - name: API_KEY_SECRET
              valueFrom:
                secretKeyRef:
                  name: opensoar-secrets
                  key: api-key-secret
            - name: PLAYBOOK_DIRS
              value: {{ .Values.api.playbookDirs | quote }}
{{- if .Values.api.extraEnv }}
{{ toYaml .Values.api.extraEnv | indent 12 }}
{{- end }}
          ports:
            - containerPort: 8000
              name: http
          readinessProbe:
            httpGet:
              path: /docs
              port: http
            initialDelaySeconds: 10
            periodSeconds: 10
          resources:
{{ toYaml .Values.api.resources | indent 12 }}
