name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: opensoar-hq/opensoar-core

jobs:
  test:
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_USER: opensoar
          POSTGRES_PASSWORD: opensoar
          POSTGRES_DB: opensoar_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 5s
          --health-timeout 5s
          --health-retries 5

      redis:
        image: redis:7
        ports:
          - 6379:6379
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 5

    steps:
      - uses: actions/checkout@v5

      - uses: actions/setup-python@v6
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: pip install -e ".[dev]"

      - name: Run linter
        run: ruff check src/ tests/

      - name: Run tests
        env:
          DATABASE_URL: postgresql+asyncpg://opensoar:opensoar@localhost:5432/opensoar_test
          REDIS_URL: redis://localhost:6379/0
          JWT_SECRET: test-secret-for-ci
          API_KEY_SECRET: test-api-key-secret
        run: pytest -v --tb=short

  compose-upgrade-smoke:
    runs-on: ubuntu-latest
    needs: test

    steps:
      - uses: actions/checkout@v5

      - uses: actions/setup-python@v6
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: pip install -e ".[dev]"

      - name: Start base services
        env:
          POSTGRES_PASSWORD: opensoar_dev
          JWT_SECRET: test-secret-which-is-long-enough-for-hs256
          API_KEY_SECRET: test-api-key-secret
        run: |
          for i in $(seq 1 3); do
            if docker compose up -d postgres redis; then
              exit 0
            fi
            echo "docker compose up -d postgres redis failed on attempt $i; retrying..."
            sleep 5
          done
          echo "docker compose up -d postgres redis failed after 3 attempts"
          exit 1

      - name: Wait for Postgres readiness
        run: |
          for i in $(seq 1 30); do
            if docker compose exec -T postgres pg_isready -U opensoar >/dev/null 2>&1; then
              exit 0
            fi
            sleep 2
          done
          echo "Postgres did not become ready in time"
          docker compose ps
          docker compose logs postgres
          exit 1

      - name: Seed previous schema revision
        env:
          DATABASE_URL: postgresql+asyncpg://opensoar:opensoar_dev@localhost:5433/opensoar
          JWT_SECRET: test-secret-which-is-long-enough-for-hs256
          API_KEY_SECRET: test-api-key-secret
        run: alembic upgrade 6c2d5f4b8e91

      - name: Start API through default compose path
        env:
          POSTGRES_PASSWORD: opensoar_dev
          JWT_SECRET: test-secret-which-is-long-enough-for-hs256
          API_KEY_SECRET: test-api-key-secret
        run: |
          for i in $(seq 1 3); do
            if docker compose up -d --build api; then
              exit 0
            fi
            echo "docker compose up --build api failed on attempt $i; retrying..."
            sleep 5
          done
          echo "docker compose up --build api failed after 3 attempts"
          exit 1

      - name: Wait for API health
        run: |
          for i in $(seq 1 30); do
            if docker compose exec -T api python -c "import json, urllib.request; payload = json.load(urllib.request.urlopen('http://127.0.0.1:8000/api/v1/health')); raise SystemExit(0 if payload.get('status') == 'ok' else 1)" >/dev/null 2>&1
            then
              exit 0
            fi
            sleep 2
          done
          echo "API did not become healthy in time"
          docker compose ps
          docker compose logs migrate api
          exit 1

      - name: Stop compose stack
        if: always()
        run: docker compose down -v

  deploy-install-smoke:
    runs-on: ubuntu-latest
    needs: test

    steps:
      - uses: actions/checkout@v5

      - name: Build local deploy images
        run: |
          docker build . --target api -t ghcr.io/opensoar-hq/opensoar-core-api:latest
          docker build . --target worker -t ghcr.io/opensoar-hq/opensoar-core-worker:latest
          docker build . --target migrate -t ghcr.io/opensoar-hq/opensoar-core-migrate:latest
          docker build . --target ui -t ghcr.io/opensoar-hq/opensoar-core-ui:latest

      - name: Run install script against local deploy assets
        env:
          BASE_URL: file://${{ github.workspace }}/deploy
          OPENSOAR_SKIP_PULL: "1"
          OPENSOAR_DIR: /tmp/opensoar-install
        run: bash ./scripts/install.sh

      - name: Wait for installed API health
        env:
          OPENSOAR_DIR: /tmp/opensoar-install
        run: |
          API_PORT="$(awk -F= '$1 == "API_PORT" { print $2; exit }' "$OPENSOAR_DIR/.env")"
          API_PORT="${API_PORT:-8000}"
          for i in $(seq 1 30); do
            if curl -fsS "http://127.0.0.1:${API_PORT}/api/v1/health" >/dev/null; then
              exit 0
            fi
            sleep 2
          done
          echo "Installed API did not become healthy in time"
          docker compose -f "$OPENSOAR_DIR/docker-compose.yml" --env-file "$OPENSOAR_DIR/.env" ps
          docker compose -f "$OPENSOAR_DIR/docker-compose.yml" --env-file "$OPENSOAR_DIR/.env" logs api worker migrate
          exit 1

      - name: Stop installed stack
        if: always()
        env:
          OPENSOAR_DIR: /tmp/opensoar-install
        run: docker compose -f "$OPENSOAR_DIR/docker-compose.yml" --env-file "$OPENSOAR_DIR/.env" down -v

  helm-packaging-smoke:
    runs-on: ubuntu-latest
    needs: test

    steps:
      - uses: actions/checkout@v5

      - name: Validate Helm chart renders expected packaging objects
        run: |
          helm lint ./helm/opensoar
          helm template opensoar ./helm/opensoar > /tmp/opensoar-helm.yaml
          grep -q 'kind: Job' /tmp/opensoar-helm.yaml
          grep -q 'helm.sh/hook.*pre-install,pre-upgrade' /tmp/opensoar-helm.yaml
          grep -q 'name: API_KEY_SECRET' /tmp/opensoar-helm.yaml
          grep -q 'name: PLAYBOOK_DIRS' /tmp/opensoar-helm.yaml
          grep -q 'app.kubernetes.io/component: worker' /tmp/opensoar-helm.yaml

  ui-test:
    runs-on: ubuntu-latest

    defaults:
      run:
        working-directory: ui

    steps:
      - uses: actions/checkout@v5

      - uses: actions/setup-node@v5
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: ui/package-lock.json

      - name: Install UI dependencies
        run: npm ci

      - name: Lint UI
        run: npm run lint

      - name: Run UI component tests
        run: npm test

      - name: Type-check UI
        run: npx tsc -b

  build:
    runs-on: ubuntu-latest
    needs: [test, ui-test, compose-upgrade-smoke, deploy-install-smoke, helm-packaging-smoke]
    if: github.event_name == 'push'
    permissions:
      contents: read
      packages: write

    strategy:
      matrix:
        target: [api, worker, migrate, ui]

    steps:
      - uses: actions/checkout@v5

      - uses: docker/login-action@v4
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - uses: docker/build-push-action@v7
        with:
          context: .
          target: ${{ matrix.target }}
          push: true
          tags: |
            ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}-${{ matrix.target }}:latest
            ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}-${{ matrix.target }}:${{ github.sha }}
