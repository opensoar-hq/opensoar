name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: opensoar-hq/opensoar-core

jobs:
  test:
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_USER: opensoar
          POSTGRES_PASSWORD: opensoar
          POSTGRES_DB: opensoar_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 5s
          --health-timeout 5s
          --health-retries 5

      redis:
        image: redis:7
        ports:
          - 6379:6379
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 5

    steps:
      - uses: actions/checkout@v5

      - uses: actions/setup-python@v6
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: pip install -e ".[dev]"

      - name: Run linter
        run: ruff check src/ tests/

      - name: Run tests
        env:
          DATABASE_URL: postgresql+asyncpg://opensoar:opensoar@localhost:5432/opensoar_test
          REDIS_URL: redis://localhost:6379/0
          JWT_SECRET: test-secret-for-ci
          API_KEY_SECRET: test-api-key-secret
        run: pytest -v --tb=short

  compose-upgrade-smoke:
    runs-on: ubuntu-latest
    needs: test

    steps:
      - uses: actions/checkout@v5

      - uses: actions/setup-python@v6
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: pip install -e ".[dev]"

      - name: Start base services
        env:
          POSTGRES_PASSWORD: opensoar_dev
          JWT_SECRET: test-secret-which-is-long-enough-for-hs256
          API_KEY_SECRET: test-api-key-secret
        run: docker compose up -d postgres redis

      - name: Seed previous schema revision
        env:
          DATABASE_URL: postgresql+asyncpg://opensoar:opensoar_dev@localhost:5433/opensoar
          JWT_SECRET: test-secret-which-is-long-enough-for-hs256
          API_KEY_SECRET: test-api-key-secret
        run: alembic upgrade 6c2d5f4b8e91

      - name: Start API through default compose path
        env:
          POSTGRES_PASSWORD: opensoar_dev
          JWT_SECRET: test-secret-which-is-long-enough-for-hs256
          API_KEY_SECRET: test-api-key-secret
        run: docker compose up -d --build api

      - name: Wait for API health
        run: |
          for i in $(seq 1 30); do
            if docker compose exec -T api python -c "import json, urllib.request; payload = json.load(urllib.request.urlopen('http://127.0.0.1:8000/api/v1/health')); raise SystemExit(0 if payload.get('status') == 'ok' else 1)" >/dev/null 2>&1
            then
              exit 0
            fi
            sleep 2
          done
          echo "API did not become healthy in time"
          docker compose ps
          docker compose logs migrate api
          exit 1

      - name: Stop compose stack
        if: always()
        run: docker compose down -v

  build:
    runs-on: ubuntu-latest
    needs: [test, compose-upgrade-smoke]
    if: github.event_name == 'push'
    permissions:
      contents: read
      packages: write

    strategy:
      matrix:
        target: [api, worker, migrate, ui]

    steps:
      - uses: actions/checkout@v5

      - uses: docker/login-action@v4
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - uses: docker/build-push-action@v7
        with:
          context: .
          target: ${{ matrix.target }}
          push: true
          tags: |
            ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}-${{ matrix.target }}:latest
            ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}-${{ matrix.target }}:${{ github.sha }}
